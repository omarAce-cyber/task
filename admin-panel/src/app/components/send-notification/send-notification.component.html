<div class="notification-container">
  <div class="card">
    <div class="card-header">
      <h2>🔔 Send Push Notification</h2>
      <p>Send notifications to all registered mobile devices</p>
    </div>

    <div class="card-body">
      <div *ngIf="successMessage" class="alert alert-success">
        ✅ {{ successMessage }}
      </div>
      <div *ngIf="errorMessage" class="alert alert-error">
        ❌ {{ errorMessage }}
      </div>

      <div class="form-group">
        <label for="title">Notification Title</label>
        <input
          id="title"
          type="text"
          [(ngModel)]="title"
          placeholder="Enter notification title"
          class="form-control"
          [disabled]="loading"
        />
      </div>

      <div class="form-group">
        <label for="body">Notification Body</label>
        <textarea
          id="body"
          [(ngModel)]="body"
          placeholder="Enter notification message"
          class="form-control"
          rows="4"
          [disabled]="loading"
        ></textarea>
      </div>

      <div class="form-group">
        <label for="sentBy">Sent By</label>
        <input
          id="sentBy"
          type="text"
          [(ngModel)]="sentBy"
          placeholder="Admin"
          class="form-control"
          [disabled]="loading"
        />
      </div>

      <button
        class="btn btn-primary"
        (click)="sendNotification()"
        [disabled]="loading"
      >
        <span *ngIf="!loading">📤 Send Notification</span>
        <span *ngIf="loading">⏳ Sending...</span>
      </button>
    </div>
  </div>
</div>
